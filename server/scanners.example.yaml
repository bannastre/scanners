# Copy this to scanners.yaml and edit to taste.
#
# Before running, start the IBKR Client Portal Gateway:
#   https://www.interactivebrokers.com/en/trading/ib-api.php
# Then authenticate at https://localhost:5000 in your browser.

ibkr:
  base_url: https://localhost:5000  # Client Portal Gateway default

# Each scanner refreshes on its own interval. Conditions are AND-ed together.
# Available indicator names: close, open, high, low, volume,
# sma_5/10/20/50/200, ema_9/12/26, rsi_14, macd, macd_signal, macd_hist,
# bb_upper/bb_lower/bb_mid, atr_14, volume_sma_20, volume_ratio, pct_change.
# Each also has a prev_ prefix for the prior bar (e.g. prev_rsi_14).

scanners:
  - name: oversold-bounce
    symbols: [AAPL, MSFT, NVDA, AMZN, GOOGL, META, TSLA, AMD]
    bar_size: "5 mins"
    duration: "2 D"
    refresh_seconds: 30
    conditions:
      - rsi_14 < 35
      - close > sma_20 * 0.97
    columns: [close, rsi_14, volume, pct_change, sma_20]

  - name: volume-breakout
    symbols: [SPY, QQQ, IWM, DIA]
    bar_size: "1 min"
    duration: "1 D"
    refresh_seconds: 15
    conditions:
      - volume_ratio > 2
      - close > prev_close
    columns: [close, volume, volume_ratio, pct_change]

  - name: macd-cross-up
    symbols: [AAPL, MSFT, NVDA, AMD, TSLA]
    bar_size: "15 mins"
    duration: "5 D"
    refresh_seconds: 60
    conditions:
      - macd > macd_signal
      - prev_macd <= prev_macd_signal
    columns: [close, macd, macd_signal, rsi_14]

  # IBKR market-wide scanner. Asks the Client Portal API to search the
  # full universe filtered by `filters`, sorted by `scan_code`.
  # With enrich: true (default), historical bars are fetched per result
  # so indicator columns are populated. post_conditions can layer
  # additional indicator rules on top of the IBKR filters.
  - name: low-float-runners
    type: ibkr_scan
    scan_code: TOP_PERC_GAIN
    instrument: STK
    location_code: STK.US.MAJOR
    refresh_seconds: 30
    filters:
      priceAbove: 2
      priceBelow: 12
      changePercAbove: 10
      volumeVsAvgAbove: 500
    columns: [close, pct_change, volume, volume_ratio]
